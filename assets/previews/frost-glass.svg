<svg xmlns="http://www.w3.org/2000/svg" width="340" height="190" viewBox="0 0 340 190" role="img" aria-label="Frost Glass theme preview">
  <title>Frost Glass theme preview (glass)</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0.000" stop-color="#f4f8ff"/><stop offset="0.500" stop-color="#e7eefb"/><stop offset="1.000" stop-color="#dfe9fb"/></linearGradient>
    <linearGradient id="frost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#f7faff" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#f7faff" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="glassBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6997dd"/>
      <stop offset="1" stop-color="#2f6fd0"/>
    </linearGradient>
    <filter id="blobs" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="9"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#2f6fd0" flood-opacity="0.85"/></filter>
    <clipPath id="card"><rect x="0.5" y="0.5" width="339" height="189" rx="14"/></clipPath>
  </defs>
  <rect x="0.5" y="0.5" width="339" height="189" rx="14" fill="url(#bg)" stroke="#cdd9ec"/>
  <g clip-path="url(#card)" filter="url(#blobs)">
    <circle cx="300" cy="28" r="48" fill="#2f6fd0" opacity="0.5"/>
    <circle cx="36" cy="172" r="52" fill="#2e9e6b" opacity="0.45"/>
    <circle cx="250" cy="186" r="56" fill="#d64f63" opacity="0.4"/>
  </g>
  <!-- window controls -->
  <circle cx="22" cy="24" r="5" fill="#d64f63"/>
  <circle cx="40" cy="24" r="5" fill="#b7790f"/>
  <circle cx="58" cy="24" r="5" fill="#2e9e6b"/>
  <text x="78" y="28" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#1c2738">Frost Glass</text>
  <!-- sidebar (frosted) -->
  <rect x="16" y="44" width="104" height="130" rx="11" fill="url(#frost)" stroke="#ffffff" stroke-opacity="0.6"/>
  <rect x="24" y="56" width="88" height="20" rx="7" fill="url(#glassBtn)" stroke="#ffffff" stroke-opacity="0.75"/>
  <text x="33" y="70" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#ffffff">Library</text>
  <text x="33" y="96" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#51617a">Saves</text>
  <text x="33" y="116" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#51617a">Cloud</text>
  <text x="33" y="136" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#51617a">History</text>
  <text x="33" y="156" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#51617a">Settings</text>
  <!-- main panel (frosted) -->
  <rect x="128" y="44" width="196" height="130" rx="11" fill="url(#frost)" stroke="#ffffff" stroke-opacity="0.6"/>
  <text x="142" y="70" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#1c2738">All saves synced</text>
  <text x="142" y="90" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#51617a">Last backup · 2m ago</text>
  <text x="142" y="106" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" fill="#51617a">12 slots · 1.2 GB</text>
  <line x1="142" y1="118" x2="310" y2="118" stroke="#ffffff" stroke-opacity="0.35"/>
  <rect x="142" y="130" width="84" height="26" rx="9" fill="url(#glassBtn)" stroke="#ffffff" stroke-opacity="0.8" filter="url(#glow)"/>
  <text x="184" y="147" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Sync now</text>
  <circle cx="250" cy="143" r="5" fill="#2e9e6b"/>
  <circle cx="272" cy="143" r="5" fill="#b7790f"/>
  <circle cx="294" cy="143" r="5" fill="#d64f63"/>
</svg>
