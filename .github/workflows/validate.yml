name: Validate themes

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate theme files
        run: node scripts/validate.mjs

      - name: Check index.json is up to date
        run: node scripts/generate-index.mjs --check

      - name: Check theme previews are up to date
        run: node scripts/generate-previews.mjs --check
